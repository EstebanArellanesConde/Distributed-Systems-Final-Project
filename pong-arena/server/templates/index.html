<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pong Arena - Pantalla Dividida</title>
    <style>
        /* Reseteo global: evita que los bordes y márgenes internos sumen al tamaño total del elemento */
        * { box-sizing: border-box; }

        /* Contenedor principal que abarca toda la pantalla de forma dinámica */
        body {
            background: #111827; /* Color de fondo oscuro */
            color: white; /* Texto blanco por defecto */
            font-family: Arial, sans-serif; /* Tipografía limpia sin serifas */
            margin: 0;
            padding: 0;
            /* 100dvh (Dynamic Viewport Height) ignora la barra de direcciones en móviles */
            height: 100dvh;      
            width: 100vw;       
            overflow: hidden; /* Oculta cualquier desbordamiento para evitar scroll */
            display: flex;
            justify-content: center; /* Centra el contenido horizontalmente */
            align-items: center; /* Centra el contenido verticalmente */
        }

        /* Clase base para las 4 pantallas (Menú, Lobby, Juego, Fin) */
        .screen {
            display: none; /* Ocultas por defecto */
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Clase activa que Javascript inyectará para mostrar la pantalla actual */
        .screen.active {
            display: flex;
        }

        /* Estilos de tipografía y botones globales */
        h1 { color: #00e5ff; margin-bottom: 20px; text-align: center; }
        button {
            padding: 12px 20px; margin: 8px;
            border: none; border-radius: 8px;
            cursor: pointer; font-size: 16px; font-weight: bold;
        }

        /* Colores específicos para botones principales */
        #menuScreen button { background: #00e5ff; color: black; }
        #readyButton { background: #22c55e; color: white; font-size: 18px; width: 250px; margin-top: 20px; }
        
        /* Entradas de texto y menús desplegables redondeados */
        input, select {
            padding: 10px; border-radius: 8px;
            border: none; margin: 5px; font-size: 16px;
        }

        /* Tarjetas de fondo oscuro para agrupar elementos de interfaz */
        .card {
            background: #1f2937;
            padding: 20px;
            border-radius: 12px;
            margin: 10px;
            text-align: center;
        }

        /* Lista de jugadores sin viñetas y centrada */
        #playerList { list-style: none; padding: 0; width: 100%; text-align: center; }
        #playerList li { margin: 10px; font-size: 18px; font-weight: bold; }

        /* Probador visual de controles WASD / Flechas */
        #controlsTester { margin: 10px auto; padding: 15px; background: #374151; border-radius: 10px; }
        .key-row { display: flex; justify-content: center; margin: 5px 0; }
        
        /* Cajas individuales que simulan las teclas físicas */
        .key {
            display: inline-block; width: 50px; height: 50px; line-height: 50px;
            margin: 0 5px; background: #4b5563; border-radius: 8px;
            font-weight: bold; color: #9ca3af; transition: 0.1s; text-align: center;
        }
        /* Efecto visual cuando la tecla es presionada */
        .key.active { background: #00e5ff; color: black; transform: scale(0.95); }

        /* --- CONTENEDOR DEL JUEGO RESPONSIVO --- */
        #gameScreen.active {
            display: flex;
            flex-direction: column; /* Coloca el HUD arriba y el Canvas abajo */
            width: 100vw;
            height: 100dvh;         
            padding: 10px;
            padding-bottom: 30px; /* Espacio de seguridad para dispositivos móviles */  
            box-sizing: border-box;
        }

        /* HUD Superior (Títulos y Puntuaciones) */
        #topHUD {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            flex-shrink: 0; /* Impide que el HUD se aplaste si falta espacio vertical */        
            margin-bottom: 10px;
        }

        /* Textos del HUD */
        #gameTitle { margin: 0; font-size: 28px; color: #00e5ff; text-transform: uppercase; }
        #gameSubtitle { margin: 5px 0 10px 0; font-size: 16px; color: #fbbf24; text-align: center; }

        /* Barra de puntajes horizontal */
        #scoreBoard {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap; /* Permite saltos de línea si la pantalla es muy delgada */       
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 400px; /* Adaptado al nuevo ancho de cámara */
        }

        /* Fichas individuales de puntaje por jugador */
        .score-item {
            background: #1f2937;
            padding: 5px 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Contenedor que encierra el Canvas para manejar su tamaño responsivo */
        #canvasContainer {
            flex: 1; /* Absorbe el espacio vertical sobrante debajo del HUD */               
            min-height: 0; /* Permite que el contenedor colapse si es necesario */         
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- LENTE DE CÁMARA (PANTALLA DIVIDIDA) --- */
        canvas {
            max-width: 100%;        
            max-height: 65dvh; /* Límite de altura máxima para no tapar el HUD */     
            /* MODIFICACIÓN: La relación de aspecto ahora es 1/2 (400 ancho / 800 alto) */
            aspect-ratio: 1 / 2;    
            object-fit: contain; /* Ajusta el lienzo al espacio disponible sin deformarlo */   
            border: 4px solid #374151;
            border-radius: 8px;
            background: #0f172a;
        }
    </style>
</head>
<body>

<div id="menuScreen" class="screen active">
    <h1 style="font-size: 48px;">Pong Arena</h1>
    <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
        
        <div class="card">
            <h3>Configurar Nueva Partida</h3>
            <select id="playerCount">
                <option value="2" selected>2 Jugadores (Pantalla Dividida)</option>
                <option value="4">4 Jugadores</option>
            </select>
            <select id="targetScore">
                <option value="5">5 Puntos</option>
                <option value="10" selected>10 Puntos</option>
                <option value="20">20 Puntos</option>
            </select>
            <br><br>
            <button onclick="createRoom()">Crear Sala</button>
        </div>
        
        <div class="card">
            <h3>Unirse a una Partida</h3>
            <input id="roomCode" placeholder="Código de sala">
            <br><br>
            <button onclick="joinRoom()">Unirse</button>
        </div>
    </div>
</div>

<div id="lobbyScreen" class="screen">
    <h2 id="roomTitle" style="font-size: 36px; margin-bottom: 5px;"></h2>
    <h3 id="roomConfigText" style="color: #9ca3af; margin-top: 0;"></h3>
    
    <h2 id="myRoleText" style="margin: 10px 0;"></h2>

    <div style="display: flex; gap: 20px; width: 100%; max-width: 800px; flex-wrap: wrap; justify-content: center;">
        
        <div class="card" style="flex: 1; min-width: 300px;">
            <h3>Jugadores en la sala</h3>
            <ul id="playerList"></ul>
        </div>

        <div class="card" style="flex: 1; min-width: 300px;">
            <div id="controlsTester">
                <h3 style="margin-top: 0;">Prueba tus controles</h3>
                <p style="font-size: 14px;">Usa Flechas o WASD</p>
                <div class="key-row"><span id="ui-ArrowUp" class="key">W / ↑</span></div>
                <div class="key-row">
                    <span id="ui-ArrowLeft" class="key">A / ←</span>
                    <span id="ui-ArrowDown" class="key">S / ↓</span>
                    <span id="ui-ArrowRight" class="key">D / →</span>
                </div>
            </div>
        </div>
    </div>

    <button id="readyButton">¡ESTOY LISTO!</button>
</div>

<div id="gameScreen" class="screen">
    
    <div id="topHUD">
        <h1 id="gameTitle">Pong Arena</h1>
        <h3 id="gameSubtitle">Esperando inicio...</h3>
        <div id="scoreBoard"></div>
    </div>
    
    <div id="canvasContainer">
        <canvas id="gameCanvas" width="400" height="800"></canvas>
    </div>
    
</div>

<div id="gameOverScreen" class="screen">
    <h1 style="font-size: 60px; color: #fbbf24; margin-bottom: 10px; text-align: center;">¡FIN DEL JUEGO!</h1>
    <h2 id="winnerText" style="font-size: 48px; margin: 20px 0; text-align: center;"></h2>
    <button onclick="location.reload()" style="margin-top: 40px; background: #00e5ff; color: black;">
        Regresar al Menú Principal
    </button>
</div>

<script src="/static/game.js"></script>
</body>
</html>
